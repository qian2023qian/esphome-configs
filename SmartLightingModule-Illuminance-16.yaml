# ==========================================
# 433MHz 遥控器接收与解码模块
# ==========================================
remote_receiver:  
  pin: GPIO6
  dump: 
   - rc_switch         
  # rc_switch 默认能捕获市面绝大多数 24 位 EV1527 模块码
  # 滤波器设置，容差可根据实际效果调整
  tolerance: 50%            # 接收信号的时间容差
  filter: 200us             # 过滤掉短于250微秒的脉冲（噪声）
  idle: 2ms                 # 判断一帧数据结束的空闲时间

  on_rc_switch:
    then:
      - lambda: |-
          uint32_t code = x.code;
          // 拆分24位编码：高16位为遥控器唯一ID，低8位为按键功能码
          uint32_t remote_id = (code >> 8) & 0xFFFF;
          uint8_t btn_code = code & 0xFF;
          uint32_t now = millis();
          int max_ch = id(max_remote_channels);

          // 辅助：按键码 → 通道号，0 表示非灯控键
          auto btn_to_ch = [](uint8_t btn) -> int {
            switch (btn) {
              case 0x10: return 1;  case 0x03: return 2;
              case 0x02: return 3;  case 0x01: return 4;
              case 0x00: return 5;  case 0x11: return 6;
              case 0x07: return 7;  case 0x06: return 8;
              case 0x05: return 9;  case 0x04: return 10;
              case 0x12: return 11; case 0x0B: return 12;
              case 0x0A: return 13; case 0x09: return 14;
              case 0x08: return 15; case 0x13: return 16;
              default: return 0;
            }
          };

          // 辅助：切换指定通道（校验 max_ch）
          auto toggle_if = [max_ch](int ch) {
            if (ch < 1 || ch > max_ch) return;
            switch (ch) {
              case 1: id(ch1).toggle(); break;
              case 2: id(ch2).toggle(); break;
              case 3: id(ch3).toggle(); break;
              case 4: id(ch4).toggle(); break;
              case 5: id(ch5).toggle(); break;
              case 6: id(ch6).toggle(); break;
              case 7: id(ch7).toggle(); break;
              case 8: id(ch8).toggle(); break;
              case 9: id(ch9).toggle(); break;
              case 10: id(ch10).toggle(); break;
              case 11: id(ch11).toggle(); break;
              case 12: id(ch12).toggle(); break;
              case 13: id(ch13).toggle(); break;
              case 14: id(ch14).toggle(); break;
              case 15: id(ch15).toggle(); break;
              case 16: id(ch16).toggle(); break;
            }
          };

          // ==============================
          // 如果之前跟踪的按键被新按键打断，先触发其短按
          // ==============================
          if (id(hold_key_code) != 0 && id(hold_key_code) != btn_code) {
            if (!id(hold_long_done)) {
              int prev_ch = btn_to_ch(id(hold_key_code));
              if (prev_ch > 0 && prev_ch <= max_ch) {
                ESP_LOGD("RF_433", "短按(释放) 0x%02X → 灯光-%02d", id(hold_key_code), prev_ch);
                toggle_if(prev_ch);
              }
            }
            id(hold_key_start) = 0;
            id(hold_key_code) = 0;
            id(hold_long_done) = false;
          }

          // ==============================
          // [配对] 4键长按3秒 = 对码（有空余槽位即可）
          // ==============================
          if (btn_code == 0x01) {
            if (id(hold_key_code) != 0x01) {
              id(hold_key_start) = now;
              id(hold_key_code) = 0x01;
              id(hold_key_last_time) = now;
              id(hold_long_done) = false;
            } else {
              id(hold_key_last_time) = now;
            }
            if (!id(hold_long_done) && now - id(hold_key_start) >= 3000) {
              id(hold_long_done) = true;
              if (id(paired_remote_id_1) == remote_id || id(paired_remote_id_2) == remote_id ||
                  id(paired_remote_id_3) == remote_id || id(paired_remote_id_4) == remote_id) {
                ESP_LOGI("RF_433", "遥控器 ID: %04X 已绑定，无需重复对码", remote_id);
              } else if (id(paired_remote_id_1) == 0) {
                id(paired_remote_id_1) = remote_id;
                ESP_LOGI("RF_433", "对码成功！遥控器 ID: %04X → 槽位1", remote_id);
              } else if (id(paired_remote_id_2) == 0) {
                id(paired_remote_id_2) = remote_id;
                ESP_LOGI("RF_433", "对码成功！遥控器 ID: %04X → 槽位2", remote_id);
              } else if (id(paired_remote_id_3) == 0) {
                id(paired_remote_id_3) = remote_id;
                ESP_LOGI("RF_433", "对码成功！遥控器 ID: %04X → 槽位3", remote_id);
              } else if (id(paired_remote_id_4) == 0) {
                id(paired_remote_id_4) = remote_id;
                ESP_LOGI("RF_433", "对码成功！遥控器 ID: %04X → 槽位4", remote_id);
              } else {
                ESP_LOGW("RF_433", "对码失败！所有槽位已满");
              }
            }
            return;
          }

          // ==============================
          // [安全] 验证遥控器权限（检查所有4个槽位）
          // ==============================
          {
            bool has_any = (id(paired_remote_id_1) != 0 || id(paired_remote_id_2) != 0 ||
                            id(paired_remote_id_3) != 0 || id(paired_remote_id_4) != 0);
            bool ok = (id(paired_remote_id_1) == remote_id || id(paired_remote_id_2) == remote_id ||
                       id(paired_remote_id_3) == remote_id || id(paired_remote_id_4) == remote_id);
            if (has_any && !ok) {
              ESP_LOGW("RF_433", "收到未授权的遥控器指令，已拦截！遥控器ID: %04X", remote_id);
              return;
            }
          }

          // ==============================
          // [长按] 2键全开 / 3键全关（3秒长按），仅控制 1..max_ch
          // ==============================
          if (btn_code == 0x03 || btn_code == 0x02) {
            if (id(hold_key_code) != btn_code) {
              id(hold_key_start) = now;
              id(hold_key_code) = btn_code;
              id(hold_key_last_time) = now;
              id(hold_long_done) = false;
            } else {
              id(hold_key_last_time) = now;
            }
            if (!id(hold_long_done) && now - id(hold_key_start) >= 3000) {
              id(hold_long_done) = true;
              uint16_t mask = 0;
              for (int i = 0; i < max_ch; i++) mask |= (1 << (15 - i));
              uint8_t d0 = (mask >> 8) & 0xFF;
              uint8_t d1 = mask & 0xFF;
              if (btn_code == 0x03) {
                ESP_LOGI("RF_433", "2键长按：全开 1-%d 路", max_ch);
                id(send_cmd)->execute(0x51, d0, d1);
              } else {
                ESP_LOGI("RF_433", "3键长按：全关 1-%d 路", max_ch);
                id(send_cmd)->execute(0x52, d0, d1);
              }
            }
            return;
          }

          // ==============================
          // [短按] 防抖 + 切换灯光（仅控制 1..max_ch）
          // ==============================
          {
            static uint32_t last_cmd_time = 0;
            static uint8_t last_btn = 0;
            if (now - last_cmd_time < 500 && last_btn == btn_code) {
              last_cmd_time = now;
              return;
            }
            last_cmd_time = now;
            last_btn = btn_code;
          }

          int ch = btn_to_ch(btn_code);
          if (ch > 0 && ch <= max_ch) {
            ESP_LOGD("RF_433", "短按 0x%02X → 灯光-%02d", btn_code, ch);
            toggle_if(ch);
          }

# 16路继电器配置 (data0对应1-8路，data1对应9-16路)
# 关键：optimistic: false 确保上电时不会主动发送命令，完全依赖模块返回的真实状态
switch:
  - platform: template
    name: "灯光-01"
    id: ch1
    optimistic: true  # 启动时乐观地认为它是关闭的，直到收到状态包更新为止
    restore_mode: DISABLED # 上电不恢复状态，避免状态不一致导致误操作
    turn_on_action:  { script.execute: { id: interlocked_turn_on, cmd: 0x51, data0: 0x80, data1: 0x00, ch: 1 } }
    turn_off_action: { script.execute: { id: send_cmd, cmd: 0x52, data0: 0x80, data1: 0x00 } }
