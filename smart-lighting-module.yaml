web_server:
  port: 80      
uart:
  id: uart_bus
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 9600

# 全局变量
globals:
  - id: rx_buf
    type: std::vector<uint8_t>
    # 修复报错：明确初始化为空的 vector
    initial_value: 'std::vector<uint8_t>()'
  - id: poll_counter
    type: int
    initial_value: '0'
  - id: retry_count
    type: int
    initial_value: '0'
  - id: awaiting_response
    type: bool
    initial_value: 'false'

script:
  # 队列模式发送控制指令
  - id: send_cmd
    mode: queued
    max_runs: 32
    parameters:
      cmd: int
      data0: int
      data1: int
    then:
      - lambda: |-
          uint8_t payload[] = {0xF5, (uint8_t)cmd, (uint8_t)data0, (uint8_t)data1, (uint8_t)(0xF5 + cmd + data0 + data1)};
          id(uart_bus).write_array(payload, 5);
      - delay: 100ms

  - id: query_state
    mode: queued
    then:
      - lambda: 'uint8_t p[] = {0xF5, 0x10, 0x00, 0x00, 0x05}; id(uart_bus).write_array(p, 5);'
      - delay: 100ms

# 定时器：轮询和重试
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(auto_poll_sw).state) {
            id(poll_counter)++;
            if (id(poll_counter) >= id(poll_time).state) {
              id(poll_counter) = 0; id(query_state).execute();
              id(awaiting_response) = true; id(retry_count) = 0;
            } else if (id(awaiting_response) && id(poll_counter) == 2) {
              if (id(retry_count) < 3) { id(retry_count)++; id(query_state).execute(); }
              else { id(awaiting_response) = false; }
            }
          }

button:
  - platform: template
    name: "手动刷新状态"
    on_press:
      - script.execute: query_state
  - platform: template
    name: "全开所有灯 ON"
    on_press:
      - script.execute: { id: send_cmd, cmd: 0x51, data0: 0xFF, data1: 0xFF }
  - platform: template
    name: "全关所有灯 OFF"
    on_press:
      - script.execute: { id: send_cmd, cmd: 0x52, data0: 0xFF, data1: 0xFF }

number:
  - platform: template
    name: "轮询间隔"
    id: poll_time
    min_value: 5
    max_value: 240
    step: 1
    restore_value: true
    initial_value: 10
    optimistic: true

switch:
  - platform: template
    name: "状态自动轮询开关"
    id: auto_poll_sw
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # 16路继电器配置 (data0对应1-8路，data1对应9-16路)
  - platform: template
    name: "灯光-01"
    id: ch1
    turn_on_action:  { script.execute: { id: send_cmd, cmd: 0x51, data0: 0x80, data1: 0x00 } }
    turn_off_action: { script.execute: { id: send_cmd, cmd: 0x52, data0: 0x80, data1: 0x00 } }
