sensor:
  - platform: wifi_signal
    name: "WiFi 信号强度"
    update_interval: 60s  
  # 无线信号强度百分比
  - platform: wifi_signal
    name: "Wireless Signal"
    unit_of_measurement: "%"
    update_interval: 60s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);  //将 -100 ~ 0 dBm 转换为 0 ~ 100% 范围    