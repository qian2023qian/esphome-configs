          id(rs485_de).turn_on(); delay(5);
          uint8_t pkt[5] = {0xF5, 0x51, 0xFF, 0xFF, 0x00};
          pkt[4] = (pkt[0]+pkt[1]+pkt[2]+pkt[3]) & 0xFF;
          id(uart485).write_array(pkt, 5);
          delay(5); id(rs485_de).turn_off();  
      - delay: 80ms # 命令执行后设备会回复状态，等它回复完再读状态，避免读到半更新的状态
      - script.execute: read_status
    turn_off_action: []

  - platform: template
    name: "全部灯 关 (OFF)"
    id: all_off
    optimistic: false
    turn_on_action:
      - lambda: |-
          id(rs485_de).turn_on(); delay(5);
          uint8_t pkt[5] = {0xF5, 0x52, 0xFF, 0xFF, 0x00};
          pkt[4] = (pkt[0]+pkt[1]+pkt[2]+pkt[3]) & 0xFF;
          id(uart485).write_array(pkt, 5);
          delay(5); id(rs485_de).turn_off();
      - delay: 80ms
      - script.execute: read_status
    turn_off_action: []
sensor:
  - platform: wifi_signal
    name: "WiFi 信号强度"
    update_interval: 60s  
  # 无线信号强度百分比
  - platform: wifi_signal
    name: "Wireless Signal"
    unit_of_measurement: "%"
    update_interval: 60s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);  //将 -100 ~ 0 dBm 转换为 0 ~ 100% 范围         