substitutions:
  device_name: espmmw_05 # 设备名称，修改为你喜欢的名字
  friendly_name: 2412毫米波雷达传感器

esphome:
  name: espmmw_05 # 设备名称，修改为你喜欢的名字

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino
    version: latest

external_components:
  - source: github://liwei19920307/ESPMMW
    components: [ ra2413mt ]

logger:
  level: debug

debug:
  update_interval: 5s

api:
  encryption:
    key: "aTXEgWQIHndCXK3/e/IckmFXbf7csBLTlZ7mNJoP87M="

ota:
  - platform: esphome
    password: "4544d9b7a7a7f6d744e7390050037b45a"

wifi:
  ssid: "JUN_WIFI"
  password: "Lfj_780529@.com"
  fast_connect: on
web_server:
  port: 80
  version: 3
  include_internal: true

uart:
  - id: ra2413mt_uart
    rx_pin: 5
    tx_pin: 6
    baud_rate: 256000
    data_bits: 8
    stop_bits: 1

ra2413mt:
  uart_id: ra2413mt_uart

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${device_name}_ip
      icon: mdi:ip-outline
      internal: true
    mac_address:
      name: ${device_name}_mac
      icon: mdi:map-marker-outline
      internal: true

binary_sensor:
  - platform: gpio
    pin: 4
    name: ${device_name}_mmw
    device_class: occupancy
    icon: mdi:motion-sensor
  - platform: gpio
    pin:
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    name: ${device_name}_button
    icon: mdi:radiobox-marked
    internal: true
    on_press:
      then:
        - button.press: ${device_name}_reset_conf

sensor:
  - platform: wifi_signal
    name: ${device_name}_signal
    icon: mdi:signal
    internal: true
  - platform: debug
    free:
      name: ${device_name}_free
      unit_of_measurement: "KB"
      internal: true
      filters:
        - lambda: |-
            return x / 1024;
    block:
      name: ${device_name}_max_block
      unit_of_measurement: "KB"
      internal: true
      filters:
        - lambda: |-
            return x / 1024;
    loop_time:
      name: ${device_name}_loop_time
      internal: true
  - platform: adc
    pin: 3
    name: ${device_name}_brightness
    attenuation: 11db
    update_interval: 5s
    unit_of_measurement: "%"
    icon: mdi:brightness-6
    accuracy_decimals: 0
    filters:
      - lambda: |-
          return ( 3 - x ) / 0.03;
  - platform: internal_temperature
    name: ${device_name}_cpu_temprature
    icon: mdi:thermometer
    internal: true
  - platform: ra2413mt
    move_distance:
      name: ${device_name}_move_distance
      internal: true
    move_energy:
      name: ${device_name}_move_energy
      internal: true
    static_distance:
      name: ${device_name}_static_distance
      internal: true
    static_energy:
      name: ${device_name}_static_energy
      internal: true

number:
  - platform: ra2413mt
    max_move_distance:
      name: ${device_name}_max_move_distance
      default: 4.5
      internal: true
    max_static_distance:
      name: ${device_name}_max_static_distance
      default: 4.5
      internal: true
    move_sensitivity:
      name: ${device_name}_move_sensitivity
      default: 99
      internal: true
    static_sensitivity:
      name: ${device_name}_static_sensitivity
      default: 15
      internal: true
    unattended_duration:
      name: ${device_name}_unattended_duration
      default: 5
      internal: true

button:
  - platform: restart
    name: ${device_name}_reboot
    internal: true
  - platform: ra2413mt
    get_conf:
      name: ${device_name}_get_conf
      internal: true
    reset_conf:
      id: ${device_name}_reset_conf
      name: ${device_name}_reset_conf
      internal: true
  - platform: template
    name: ${device_name}_tv_on_off
    icon: mdi:remote-tv
    on_press:
      - remote_transmitter.transmit_raw:
          carrier_frequency: 38kHz
          code:
            [9045, -4500, 585, -520, 578, -527, 580, -525, 578, -527, 586, -518, 579, -525, 580, -525, 585, -519, 569, -1641, 583, -1626, 585, -1624, 580, -1628, 586, -1677, 579, -1630, 580, -526, 583, -1625, 586, -1623, 586, -519, 586, -1622, 582, -1628, 587, -518, 580, -524, 585, -520, 586, -519, 584, -520, 585, -1650, 584, -521, 588, -517, 580, -1630, 584, -1624, 585, -1624, 586, -1623, 585]

remote_transmitter:
  pin: 1
  carrier_duty_percent: 50%

remote_receiver:
  pin:
    number: 0
    inverted: true
  dump: all