esphome:
  name: lighting-485-16ch-ttl-1
  friendly_name: TTL-16路照明模块
  # 开机恢复轮询记忆
  on_boot:
  - priority: -200
    then:
      - delay: 2s
      - lambda: |-
          id(poll_interval_num).publish_state(id(poll_interval_sec));
      - if:
          condition:
            lambda: 'return id(poll_enable);'
          then:
            - script.execute: poll_script
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
wifi: # 配置 WiFi，建议修改为自己的网络
  ssid: "your_wifi_ssid"
  password: "your_wifi_password"
  ap: # 启用 AP 模式，方便初始配置或 WiFi 连接失败时连接
    ssid: "Lighting485-16ch"
    password: "12345678" 
ota: # 开启 OTA 升级
  - platform: esphome
    password: "12345678" # OTA 密码，建议修改为更安全的密码

api: # 开启 Home Assistant API
  encryption:
    key: "aTXEgWQIHndCXK3/e/IckmFXbf7csBLTlZ7mNJoP87M=" # 建议后续设置一个安全的加密密钥  

web_server: # 开启 Web 服务器，方便调试和手动控制 不需要的话可以删除这一段
  port: 80

logger:
  level: DEBUG # 输出调试日志，方便查看通信细节 后续调试完成后可以改为 INFO 或 WARNING 减少日志量         
captive_portal:  # 启用 Captive Portal 功能，方便在 WiFi 连接失败时自动弹出配置界面 不需要的话可以删除这一段
uart:
  id: uart485
  tx_pin: GPIO20  #tx 接灯控板的 RX
  rx_pin: GPIO21  #rx 接灯控板的 TX
  baud_rate: 9600
  parity: NONE
  data_bits: 8
  stop_bits: 1

globals:
  - id: poll_enable
    type: bool
    restore_value: true
    initial_value: 'true'          # 上电默认开启轮询
  - id: poll_interval_sec
    type: int
    restore_value: true
    initial_value: '30'            # 上电默认 30 秒

number:
  - platform: template
    name: "轮询间隔（秒，5~240）"
    id: poll_interval_num
    icon: mdi:timer
    optimistic: true # 直接根据命令更新状态，不等待实际硬件反馈
    min_value: 5
    max_value: 240
    step: 5
    mode: slider
    unit_of_measurement: "秒"
    initial_value: 30
    on_value:
      - globals.set:
          id: poll_interval_sec
          value: !lambda 'return (int)x;'
      - if:
          condition:
            lambda: 'return id(poll_enable);'
          then:
            - script.execute: poll_script   # 立即生效


script:
  - id: read_status
    then:
      - delay: 80ms
      - lambda: |-
          if (id(uart485).available() >= 5) {
            uint8_t buf[5];
            id(uart485).read_array(buf, 5);
            uint8_t calc = (buf[0] + buf[1] + buf[2] + buf[3]) & 0xFF;
            if (buf[0] == 0xFA && calc == buf[4]) {
              uint8_t xh = buf[2], xl = buf[3];
              id(light_1).publish_state((xh & 0x80) != 0);
              id(light_2).publish_state((xh & 0x40) != 0);
              id(light_3).publish_state((xh & 0x20) != 0);
              id(light_4).publish_state((xh & 0x10) != 0);
              id(light_5).publish_state((xh & 0x08) != 0);
              id(light_6).publish_state((xh & 0x04) != 0);
              id(light_7).publish_state((xh & 0x02) != 0);
              id(light_8).publish_state((xh & 0x01) != 0);
              id(light_9).publish_state((xl & 0x80) != 0);
              id(light_10).publish_state((xl & 0x40) != 0);
              id(light_11).publish_state((xl & 0x20) != 0);
              id(light_12).publish_state((xl & 0x10) != 0);
              id(light_13).publish_state((xl & 0x08) != 0);
              id(light_14).publish_state((xl & 0x04) != 0);
              id(light_15).publish_state((xl & 0x02) != 0);
              id(light_16).publish_state((xl & 0x01) != 0);
            }
          }

  - id: poll_script
    then:
      - lambda: |-
          uint8_t q[5] = {0xF5, 0x10, 0x00, 0x00, 0x00};
          q[4] = (q[0] + q[1] + q[2] + q[3]) & 0xFF;
          id(uart485).write_array(q, 5);
      - delay: 120ms
      - script.execute: read_status

interval:
  - interval: 5s  # 每 5 秒检查一次是否需要轮询
    then:
      - if:
          condition:
            lambda: 'return id(poll_enable) && id(poll_interval_sec) >= 5;'
          then:
            - lambda: |-
                static uint8_t cnt = 0;
                cnt++;
                if (cnt >= id(poll_interval_sec)) {
                  id(poll_script).execute();
                  cnt = 0;
                }

button:
  - platform: template
    name: "手动刷新状态"
    icon: mdi:refresh
    on_press:
      - script.execute: poll_script
  - platform: template
    name: "全部灯开on"
    id: all_on_btn
    icon: mdi:lightbulb-group
    on_press:
      - lambda: |-
          uint8_t pkt[5] = {0xF5, 0x51, 0xFF, 0xFF, 0x00};
          pkt[4] = (pkt[0] + pkt[1] + pkt[2] + pkt[3]) & 0xFF;
          id(uart485).write_array(pkt, 5);
      - delay: 80ms
      - script.execute: read_status

  - platform: template
    name: "全部灯关off"
    id: all_off_btn
    icon: mdi:lightbulb-group-off
    on_press:
      - lambda: |-
          uint8_t pkt[5] = {0xF5, 0x52, 0xFF, 0xFF, 0x00};
          pkt[4] = (pkt[0] + pkt[1] + pkt[2] + pkt[3]) & 0xFF;
          id(uart485).write_array(pkt, 5);
      - delay: 80ms
      - script.execute: read_status

# ====================== 完整16路开关======================
# 灯 2~灯 8、灯 10~灯 16 复制上面模板，只改 name / id / 掩码 即可
  # 掩码表（直接替换 0x80, 0x00 这两字节）：
  # 1: 80 00   2: 40 00   3: 20 00   4: 10 00
  # 5: 08 00   6: 04 00   7: 02 00   8: 01 00
  # 9: 00 80  10: 00 40  11: 00 20  12: 00 10
  # 13:00 08  14:00 04  15:00 02  16:00 01
switch:
  - platform: template  # 每个灯都用一个 template switch 来控制，on/off action 里发送对应的命令
    name: "灯 1" # 需要修改为 "灯 2" ~ "灯 16"
    id: light_1 # 需要修改为 light_2 ~ light_16，id 用于在脚本里更新状态
    optimistic: false
    turn_on_action:
      - lambda: |-
          uint8_t pkt[5] = {0xF5, 0x51, 0x80, 0x00, 0x00}; //需要修改掩码字节为对应灯的掩码
          pkt[4] = (pkt[0]+pkt[1]+pkt[2]+pkt[3]) & 0xFF;
          id(uart485).write_array(pkt, 5);
      - delay: 80ms
      - script.execute: read_status
    turn_off_action:
