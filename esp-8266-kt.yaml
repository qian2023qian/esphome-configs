esphome:
  name: esp-8266-kt
  friendly_name: ESP-8266-kt

esp8266:
  board: esp01_1m

# Enable logging
logger:
  level: INFO
# Enable Home Assistant API
api:
  encryption:
    key: "Iiho9bZt//QPgutJZWiHSMkuMQDzuEMfyQnvuZoG3TA="

ota:
  - platform: esphome
    password: "e81516587930b8eb285b9b47e66d62bd"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-8266-Kt Fallback Hotspot"
    password: "N1J5kCB4DSFr"

captive_portal:


web_server:
  port: 80


# 红外发射器配置
remote_transmitter:
  pin: GPIO4  # 根据你的硬件接线修改
  carrier_duty_percent: 50%

# ==================== 全局变量 ====================
globals:
  - id: current_temp
    type: int
    restore_value: yes
    initial_value: '100'

  - id: water_timer
    type: int
    initial_value: '0'  # 当前倒计时秒数

  - id: current_water_type
    type: int
    initial_value: '0'  # 当前出水类型：0=无, 1=热水, 2=冷水

  - id: last_water_type
    type: int
    initial_value: '0'  # 上一次按下的按钮类型（用于检测重复按下）

# ==================== 温度循环脚本 ====================
script:
  - id: adjust_temperature
    then:
      - lambda: |-
          int new_temp = id(current_temp) - 5;
          if (new_temp < 45) new_temp = 100;
          id(current_temp) = new_temp;
      - component.update: current_temp_sensor

# ==================== 出水处理脚本 ====================
  - id: toggle_hot_water
    then:
      - lambda: |-
          if (id(current_water_type) == 1 && id(water_timer) > 0) {
            // 正在出热水，再次按 → 停止
            id(water_timer) = 0;
            id(current_water_type) = 0;
          } else {
            // 否则启动热水（会先清零当前）
            id(water_timer) = 0;  // 先停止可能的冷水
            id(current_water_type) = 1;
            id(water_timer) = 25;
          }
          id(last_water_type) = 1;
      - component.update: water_countdown_sensor

  - id: toggle_cold_water
    then:
      - lambda: |-
          if (id(current_water_type) == 2 && id(water_timer) > 0) {
            // 正在出冷水，再次按 → 停止
            id(water_timer) = 0;
            id(current_water_type) = 0;
          } else {
            // 否则启动冷水
            id(water_timer) = 0;
            id(current_water_type) = 2;
            id(water_timer) = 25;
          }
          id(last_water_type) = 2;
      - component.update: water_countdown_sensor

# ==================== 每秒倒计时 ====================
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(water_timer) > 0;'
          then:
            - globals.set:
                id: water_timer
                value: !lambda 'return id(water_timer) - 1;'
            - component.update: water_countdown_sensor
          else:
            - if:
                condition:
                  lambda: 'return id(water_timer) == 0 && id(current_water_type) != 0;'
                then:
                  - globals.set:
                      id: current_water_type
                      value: '0'
                  - component.update: water_countdown_sensor

# ==================== 显示实体 ====================
text_sensor:
  - platform: template
    id: current_temp_sensor
    name: "Tea Bar Current Temp"
    icon: "mdi:thermometer"
    lambda: |-
      return {to_string(id(current_temp)) + "°C"};
    update_interval: never

  - platform: template
    id: water_countdown_sensor
    name: "Tea Bar Water Countdown"
    icon: "mdi:timer-outline"
    lambda: |-
      if (id(water_timer) > 0) {
        if (id(current_water_type) == 1) {
          return {std::to_string(id(water_timer)) + " S"};
        } else if (id(current_water_type) == 2) {
          return {std::to_string(id(water_timer)) + " S"};
        } else {
          return {std::to_string(id(water_timer)) + " S"};
        }
      } else {
        return {"OFF"};
      }
    update_interval: never
