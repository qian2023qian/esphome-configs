# 蜂鸣器输出配置
output:
  - platform: ledc
    pin: ${buzzer_pin}
    id: buzzer_output
    frequency: 1000 Hz

# ================ 全局变量用于计数器 ================
globals:
  - id: thunder_count_value
    type: int
    restore_value: yes
    initial_value: "0"
    
  - id: lightning_count_value
    type: int
    restore_value: yes
    initial_value: "0"
    
  - id: thunderstorm_count_value
    type: int
    restore_value: yes
    initial_value: "0"
    
  - id: rain_count_value
    type: int
    restore_value: yes
    initial_value: "0"

# ================ 传感器配置 ================
sensor:
  # ================ 第一部分：雷声检测传感器 ================
  
  # 声音传感器原始电压读取
  - platform: adc
    pin: ${sound_pin}
    name: "Sound Raw Voltage"
    id: sound_raw
    attenuation: 12dB
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 2
    update_interval: 50ms
    unit_of_measurement: "V"
    accuracy_decimals: 3
    entity_category: diagnostic
    internal: true

  # 分贝值计算
  - platform: template
    name: "Thunder DB Level"
    id: thunder_db
    lambda: |-
      static float quiet_voltage = 0.3;
      float current_voltage = id(sound_raw).state;
      
      if (current_voltage <= 0.0 || quiet_voltage <= 0.0) {
        return 0.0;
      }
      
      float db_estimate = 20.0 * log10f(current_voltage / quiet_voltage);
      
      if (db_estimate < 0.0) db_estimate = 0.0;
      if (db_estimate > 120.0) db_estimate = 120.0;
      
      return db_estimate;
    unit_of_measurement: "dB"
    accuracy_decimals: 1
    update_interval: 100ms
    device_class: "sound_pressure"
    state_class: "measurement"

  # ================ 第二部分：闪电检测传感器 ================
  
  # 光敏电阻原始电压读取
  - platform: adc
    pin: ${light_pin}
    name: "Light Raw Voltage"
    id: light_raw
    attenuation: 12dB
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    update_interval: 30ms
    unit_of_measurement: "V"
    accuracy_decimals: 3
    entity_category: diagnostic
    internal: true

  # 光照强度计算
  - platform: template
    name: "Lightning Intensity"
    id: lightning_intensity
    lambda: |-
      float voltage = id(light_raw).state;
      static float dark_voltage = 0.1;
      static float bright_voltage = 2.8;
      
      float percentage = 100.0 * (voltage - dark_voltage) / (bright_voltage - dark_voltage);
      
      if (percentage < 0.0) percentage = 0.0;
      if (percentage > 100.0) percentage = 100.0;
      
      return percentage;
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1s
    device_class: "illuminance"
    state_class: "measurement"

  # ================ 第三部分：雨滴检测传感器 ================
  
  # 雨滴传感器原始电压读取
  - platform: adc
    pin: ${rain_pin}
    name: "Rain Raw Voltage"
    id: rain_raw
    attenuation: 12dB
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5
    update_interval: 1s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: "mdi:weather-rainy"

  # 雨滴检测水平
  - platform: template
    name: "Rain Level"
    id: rain_level
    lambda: |-
      float voltage = id(rain_raw).state;
      // MH-RD雨滴传感器：干燥时电压高（约3.3V），湿润时电压低
      // 转换为百分比：电压越低，雨滴越多
      float percentage = 100.0 * (3.3 - voltage) / 3.3;
      if (percentage < 0.0) percentage = 0.0;
      if (percentage > 100.0) percentage = 100.0;
      return percentage;
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 2s
    icon: "mdi:water-percent"

  # ================ 第四部分：DHT11温湿度传感器（引脚已修改） ================
  - platform: dht
    pin: ${dht11_pin}  # 已从GPIO23改为GPIO18
    temperature:
      name: "Temperature"
      id: dht11_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: "temperature"
      state_class: "measurement"
    humidity:
      name: "Humidity"
      id: dht11_humidity
      unit_of_measurement: "%"
      accuracy_decimals: 1
      device_class: "humidity"
      state_class: "measurement"
    update_interval: 60s
    model: DHT11

  # ================ 第五部分：HC-SR04超声波测距传感器 ================
  - platform: ultrasonic
    trigger_pin: ${trig_pin}
    echo_pin: ${echo_pin}
    name: "Ultrasonic Distance"
    id: ultrasonic_distance
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    update_interval: 2s
    timeout: 2m
    pulse_time: 10us
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 3
    icon: "mdi:arrow-expand-horizontal"

  # ================ 计数器传感器 ================
  
  # 雷声计数器
  - platform: template
    name: "Thunder Count"
    id: thunder_counter
    unit_of_measurement: "次"
    accuracy_decimals: 0
    lambda: |-
      return id(thunder_count_value);
    icon: "mdi:counter"

  # 闪电计数器
  - platform: template
    name: "Lightning Count"
    id: lightning_counter
    unit_of_measurement: "次"
    accuracy_decimals: 0
    lambda: |-
      return id(lightning_count_value);
    icon: "mdi:counter"

  # 雷电计数器
  - platform: template
    name: "Thunderstorm Count"
    id: thunderstorm_counter
    unit_of_measurement: "次"
    accuracy_decimals: 0
    lambda: |-
      return id(thunderstorm_count_value);
    icon: "mdi:counter"

  # 下雨计数器
  - platform: template
    name: "Rain Count"
    id: rain_counter
    unit_of_measurement: "次"
    accuracy_decimals: 0
    lambda: |-
      return id(rain_count_value);
    icon: "mdi:counter"
    # ================ MQ-5 校准说明 ================
# 1. 在洁净空气中（无燃气），记录传感器电压值，计算 R0
# 2. 查看模块背面的可调电阻，可调整灵敏度
# 3. 建议先用已知浓度气体测试，修正 ppm 计算公式中的 m 和 b 参数
# 4. 参考典型值（针对 LPG/丙烷）：
#    - 洁净空气: Rs/R0 ≈ 1.0 → 0-50 ppm
#    - 轻微泄漏: Rs/R0 ≈ 0.8 → 1000-3000 ppm
#    - 严重泄漏: Rs/R0 ≈ 0.5 → 5000-10000 ppm
  # MQ-5 燃气传感器原始电压
  - platform: adc
    pin: ${mq5_ao_pin}
    id: mq5_adc_raw
    name: "MQ-5 Raw Voltage"
    update_interval: 5s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    entity_category: diagnostic
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
  # MQ-5 燃气浓度
  - platform: template
    name: "Gas Concentration (LPG/Natural Gas)"
    id: mq5_gas_concentration
    unit_of_measurement: "ppm"
    icon: "mdi:fire"
    accuracy_decimals: 0
    lambda: |-
      // 读取原始电压（经过分压后的值）
      float voltage_after_divider = id(mq5_adc_raw).state;
      
      // 如果电压无效，返回 0
      if (voltage_after_divider <= 0.0) return 0.0;
      
      // 还原分压前的实际传感器输出电压
      // 假设使用 2kΩ + 1kΩ 分压（分压比 3:1），传感器电压 = 读取电压 * 3
      float sensor_voltage = voltage_after_divider * 3.0;  // 根据实际分压电阻调整！
      
      // 限制电压范围
      if (sensor_voltage > 5.0) sensor_voltage = 5.0;
      
      // 计算 Rs/R0 比值
      // Vc 是加热电压，通常 5V
      float vc = 5.0;
      float rl = 10.0;  // 负载电阻 (kΩ)，模块上通常为 10kΩ
      
      float rs = ((vc - sensor_voltage) / sensor_voltage) * rl;
      float rs_r0_ratio = rs / 30.0;  // R0 是洁净空气中传感器的电阻，典型值 30kΩ，需要校准
      
      // 使用经验公式转换为 PPM (针对 LPG/丙烷)
      // ppm = 10^((log10(rs_r0_ratio) - b) / m)
      // 典型值：m = -0.45, b = 1.2 (针对 LPG)
      float ppm = 0.0;
      if (rs_r0_ratio > 0.0) {
        ppm = pow(10.0, (log10(rs_r0_ratio) - 1.2) / -0.45);
      }
      
      // 限制范围
      if (ppm < 0.0) ppm = 0.0;
      if (ppm > 10000.0) ppm = 10000.0;
      
      return ppm;
    update_interval: 5s
    on_value_range:
    - above: 1000
      then:
        - lambda: |-
           id(buzzer_output).set_level(0.5);
           id(buzzer_output).set_frequency(2000);  // 高频报警
           delay(500);
           id(buzzer_output).set_level(0.0);    
# ================ MQ-135 校准说明 ================
# 1. 预热时间：至少 20 秒，推荐预热 2 分钟以上。
# 2. 在洁净空气中（室外通风处）运行 30 分钟，记录 rs 值作为 R0。
# 3. 修改公式中的 R0 值（代码中为 60.0）。
# 4. 浓度公式是针对 CO2 的典型值，若需检测其他气体（NH3、苯等），请查阅手册调整 m、b 参数。
# 5. 模块背面的可调电阻用于调节数字输出（DO）的触发阈值。           
  # MQ-135 原始电压（分压后的值）
  - platform: adc
    pin: ${mq135_ao_pin}
    id: mq135_adc_raw
    name: "MQ-135 Raw Voltage"
    update_interval: 5s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    entity_category: diagnostic
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
    # MQ-135 空气质量（估算）
  - platform: template
    name: "Air Quality (MQ-135)"
    id: mq135_air_quality
    unit_of_measurement: "ppm"   # 可改为 "AQI" 或自定义
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    lambda: |-
      // 读取分压后的电压
      float v_div = id(mq135_adc_raw).state;
      if (v_div <= 0.0) return 0.0;

      // 还原传感器实际输出电压（根据分压电阻调整）
      // 假设使用 2kΩ + 1kΩ 分压，传感器电压 = v_div * (2+1)/1 = v_div * 3
      float v_sensor = v_div * 3.0;   // 请根据实际分压比修改！

      // 限制合理范围
      if (v_sensor > 5.0) v_sensor = 5.0;

      // 计算 Rs/R0 比值
      float vc = 5.0;          // 加热电压
      float rl = 10.0;         // 负载电阻 (kΩ)，模块上通常为 10kΩ
      float rs = ((vc - v_sensor) / v_sensor) * rl;
      float rs_r0_ratio = rs / 60.0;   // R0 典型值 60kΩ（洁净空气中），需实际校准

      // 使用经验公式转换为 CO2 等效浓度（ppm）或自定义指数
      // 此处以 CO2 为例：ppm = 10^((log10(rs_r0_ratio) - b) / m)
      // 典型值：m = -0.35, b = 1.25 (针对 CO2)
      float ppm = 0.0;
      if (rs_r0_ratio > 0.0) {
        ppm = pow(10.0, (log10(rs_r0_ratio) - 1.25) / -0.35);
      }

      // 限制范围
      if (ppm < 0.0) ppm = 0.0;
      if (ppm > 5000.0) ppm = 5000.0;

      return ppm;
    update_interval: 5s                 
    


# ================ 二进制传感器配置 ================
binary_sensor:
  # ================ 雷声检测器 ================
  - platform: template
    name: "Thunder Detected"
    id: thunder_detected
    filters:
      - delayed_on: 100ms
      - delayed_off: 5s
    lambda: |-
      float current_db = id(thunder_db).state;
      static float thunder_threshold = 85.0;  // 雷声检测阈值
      return current_db > thunder_threshold;
    device_class: "sound"
    on_press:
      then:
        - lambda: |-
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(262);   // Do
            delay(300);
            id(buzzer_output).set_frequency(294);  // Re
            delay(300);
            id(buzzer_output).set_level(0.0);
        - lambda: |-
            id(thunder_count_value) += 1;
            id(thunder_counter).update();

  # ================ 闪电检测器 ================
  - platform: template
    name: "Lightning Detected"
    id: lightning_detected
    filters:
      - delayed_on: 50ms
      - delayed_off: 3s
    lambda: |-
      float current_light = id(lightning_intensity).state;
      static float lightning_threshold = 80.0;  // 闪电检测阈值
      static float normal_light = 0.0;
      
      static uint32_t last_calibration = 0;
      uint32_t now = millis();
      
      if (now - last_calibration > 30000) {
        normal_light = id(lightning_intensity).state;
        last_calibration = now;
      }
      
      return (current_light > lightning_threshold) && (current_light > normal_light * 2.0);
    device_class: "light"
    on_press:
      then:
        - lambda: |-
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(330);  // Mi
            delay(300);
            id(buzzer_output).set_frequency(349);  // Fa
            delay(300);
            id(buzzer_output).set_level(0.0);
        - lambda: |-
            id(lightning_count_value) += 1;
            id(lightning_counter).update();

  # ================ 雷电综合检测（10秒内同时发生） ================
  - platform: template
    name: "Thunderstorm Detected"
    id: thunderstorm_detected
    filters:
      - delayed_on: 200ms
      - delayed_off: 10s
    lambda: |-
      static uint32_t thunder_time = 0;
      static uint32_t lightning_time = 0;
      uint32_t now = millis();
      
      if (id(thunder_detected).state) {
        thunder_time = now;
      }
      if (id(lightning_detected).state) {
        lightning_time = now;
      }
      
      return (abs(int32_t(thunder_time - lightning_time)) < 10000) && 
             (thunder_time > 0) && (lightning_time > 0);
    device_class: "safety"
    on_press:
      then:
        - lambda: |-
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(262);  // Do
            delay(300);
            id(buzzer_output).set_frequency(294);  // Re
            delay(300);
            id(buzzer_output).set_frequency(330);  // Mi
            delay(300);
            id(buzzer_output).set_frequency(349);  // Fa
            delay(300);
            id(buzzer_output).set_level(0.0);
        - lambda: |-
            id(thunderstorm_count_value) += 1;
            id(thunderstorm_counter).update();

  # ================ 雨滴检测器 ================
  - platform: template
    name: "Rain Detected"
    id: rain_detected
    filters:
      - delayed_on: 2s       # 持续2秒才确认下雨
      - delayed_off: 5s      # 停止下雨5秒后确认结束
    lambda: |-
      float rain_voltage = id(rain_raw).state;
      // 雨滴传感器：干燥时电压高（约3.3V），湿润时电压低
      // 当电压低于2.0V时，认为检测到下雨
      static float rain_threshold = 2.0;
      return rain_voltage < rain_threshold;
    device_class: "moisture"
    on_press:
      then:
        - lambda: |-
            // 播放下雨提示音：Sol-La (392Hz-440Hz)
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(392);  // Sol
            delay(300);
            id(buzzer_output).set_frequency(440);  // La
            delay(300);
            id(buzzer_output).set_level(0.0);
        - lambda: |-
            id(rain_count_value) += 1;
            id(rain_counter).update();

  # ================ 超声波遮挡物检测器 ================
  - platform: template
    name: "Object Detected"
    id: object_detected
    filters:
      - delayed_on: 500ms
      - delayed_off: 1s
    lambda: |-
      float distance = id(ultrasonic_distance).state;
      // 当距离小于30cm时，认为检测到遮挡物
      static float object_threshold = 30.0;
      return (distance > 0.0) && (distance < object_threshold);
    device_class: "moving"
    on_press:
      then:
        - lambda: |-
            // 播放物体接近警报：高音Do (523Hz)
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(523);  // Do高音
            delay(500);
            id(buzzer_output).set_level(0.0);

  # ================ 恶劣天气检测（下雨+雷电） ================
  - platform: template
    name: "Severe Weather Detected"
    id: severe_weather_detected
    filters:
      - delayed_on: 500ms
      - delayed_off: 15s
    lambda: |-
      // 如果同时检测到下雨和雷电（10秒内），则为恶劣天气
      static uint32_t rain_time = 0;
      static uint32_t thunderstorm_time = 0;
      uint32_t now = millis();
      
      if (id(rain_detected).state) {
        rain_time = now;
      }
      if (id(thunderstorm_detected).state) {
        thunderstorm_time = now;
      }
      
      return (abs(int32_t(rain_time - thunderstorm_time)) < 10000) && 
             (rain_time > 0) && (thunderstorm_time > 0);
    device_class: "problem"
    on_press:
      then:
        - lambda: |-
            // 播放恶劣天气警报：Do-Re-Mi-Fa-Sol-La
            id(buzzer_output).set_level(0.5);
            id(buzzer_output).set_frequency(262);  // Do
            delay(200);
            id(buzzer_output).set_frequency(294);  // Re
            delay(200);
            id(buzzer_output).set_frequency(330);  // Mi
            delay(200);
            id(buzzer_output).set_frequency(349);  // Fa
            delay(200);
            id(buzzer_output).set_frequency(392);  // Sol
            delay(200);
            id(buzzer_output).set_frequency(440);  // La
            delay(200);
            id(buzzer_output).set_level(0.0);
# OLED 显示屏 (SSD1306 128x64)
display: # OLED 显示屏配置
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C        # 常见 I2C 地址，若不同请修改
    id: oled_display
    pages:
      - id: page1
        lambda: |-
          // 清屏（黑色背景）
          it.fill(COLOR_OFF);
          
          // 设置字体（内置字体，也可加载自定义字体）
          it.printf(0, 0, id(arial10), "雷电检测器");
          it.line(0, 12, 128, 12);  // 分割线
          
          // 显示温湿度
          if (id(dht11_temperature).has_state()) {
            it.printf(0, 14, id(arial10), "温度: %.1f C", id(dht11_temperature).state);
          }
          if (id(dht11_humidity).has_state()) {
            it.printf(0, 26, id(arial10), "湿度: %.1f %%", id(dht11_humidity).state);
          }
          
          // 显示距离
          if (id(ultrasonic_distance).has_state()) {
            it.printf(0, 38, id(arial10), "距离: %.1f cm", id(ultrasonic_distance).state);
          }
          

      - id: page2
        lambda: |-
          it.fill(COLOR_OFF);
          it.printf(0, 0, id(arial10), "气体检测");
          it.line(0, 12, 128, 12);
          
          // MQ-5 燃气
          #ifdef USE_MQ5
          if (id(mq5_gas_concentration).has_state()) {
            it.printf(0, 14, id(arial10), "燃气: %.0f ppm", id(mq5_gas_concentration).state);
          }
          #endif
          
          // MQ-135 空气质量
          #ifdef USE_MQ135
          if (id(mq135_air_quality).has_state()) {
            it.printf(0, 26, id(arial10), "空气质量: %.0f ppm", id(mq135_air_quality).state);
          }
          #endif
          
          // 计数器
          it.printf(0, 38, id(arial10), "雷声: %d", id(thunder_count_value));
          it.printf(0, 50, id(arial10), "闪电: %d", id(lightning_count_value));

      - id: page3
        lambda: |-
          it.fill(COLOR_OFF);
          it.printf(0, 0, id(arial10), "天气事件");
          it.line(0, 12, 128, 12);
          
          it.printf(0, 14, id(arial10), "雷电: %d", id(thunderstorm_count_value));
          it.printf(0, 26, id(arial10), "下雨: %d", id(rain_count_value));
          
          // 当前检测状态
          it.printf(0, 38, id(arial10), "雷声: %s", id(thunder_detected).state ? "是" : "否");
          it.printf(0, 50, id(arial10), "闪电: %s", id(lightning_detected).state ? "是" : "否");        
# 添加一个间隔组件，每 5 秒切换一页
interval:
  - interval: 5s
    then:
      - display.page.show_next: oled_display
      - component.update: oled_display    