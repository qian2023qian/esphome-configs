# ESPHome 雷电检测系统 + 雨滴检测 + 温湿度检测 + 超声波测距
# 开发板：ESP32-S3 N16R8 UNO外壳版
# 接线说明：
# 声音传感器：AO -> IO4, VCC -> 3.3V, GND -> GND
# 光敏电阻：AO -> IO5, VCC -> 3.3V, GND -> GND
# 蜂鸣器：+ -> IO6, - -> GND（必须使用无源蜂鸣器）
# 雨滴传感器：AO -> IO7, VCC -> 3.3V, GND -> GND, DO -> 不连接
# DHT11温湿度传感器：DATA -> IO18, VCC -> 3.3V, GND -> GND  # 已从IO23改为IO18
# HC-SR04超声波传感器：Trig -> IO8, Echo -> IO9, VCC -> 5V, GND -> GND

# 引脚定义
substitutions:
  sound_pin: "4"       # 声音传感器连接到IO4引脚
  light_pin: "5"       # 光敏电阻连接到IO5引脚
  buzzer_pin: "6"      # 蜂鸣器连接到IO6引脚
  rain_pin: "7"        # 雨滴传感器连接到IO7引脚
  dht11_pin: "18"      # DHT11温湿度传感器连接到IO18引脚（已修改！）
  trig_pin: "8"        # HC-SR04 Trig引脚连接到IO8
  echo_pin: "9"        # HC-SR04 Echo引脚连接到IO9
  mq5_ao_pin: "3"       # MQ-5 模拟输出引脚（经分压后接入）
  mq5_do_pin: "2"       # MQ-5 数字输出引脚（可选）
  mq135_ao_pin: "10"      # MQ-135 模拟输出引脚（经分压后）
  mq135_do_pin: "11"      # MQ-135 数字输出引脚（可选）
  oled_sda: "16"        # OLED SDA 引脚
  oled_scl: "17"        # OLED SCL 引脚
# I2C 总线配置（供 OLED 使用）
i2c:
  sda: ${oled_sda}
  scl: ${oled_scl}
  scan: true            # 可选，启动时扫描 I2C 设备
  frequency: 400kHz      # 标准速度，可提高至 400kHz 加快刷新  
# 字体定义（用于 OLED 显示）
font:
  - id: arial10
    file: "gfonts://Roboto"
    size: 10
# 基本配置
esphome:
  name: thunder-detector-uno
  friendly_name: "雷电检测器"
  project:
    name: "thunder.detector"
    version: "1.0.0"

# 开发板配置
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
    version: recommended

# 日志设置
logger:
  level: WARN
  baud_rate: 0
api:
  encryption:
    key: "aTXEgWQIHndCXK3/e/IckmFXbf7csBLTlZ7mNJoP87M="
ota:
  - platform: esphome  #使用ESPHome的OTA更新平台
    password: "ota_password"    
    
 
wifi: #wifi配置
  ssid: "HUAWEI WIFI"      
