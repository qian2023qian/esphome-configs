# magnetic-relay-esphome.yaml
esphome:
  name: magnetic-relay
  name_add_mac_suffix: true
  friendly_name: 磁保继电器插座

esp8266:
  board: esp01_1m          # 根据你的实际flash大小调整，通常是esp01_1m 或 esp12f
  restore_from_flash: true

# ======================
#   日志级别
# ======================
logger:
  level: INFO

# ======================
#   API + OTA + WebServer
# ======================
api:
  encryption:
    key: "把这里换成你自己的随机key（在esphome里自动生成）"

ota:
  - platform: esphome
    password: ""   # 建议后续设置密码

web_server:
  port: 80

# ======================
#   WiFi 配置 - 首次AP模式
# ======================
wifi:
  # 不写 ssid/password  → 自动进入 AP 模式
  ap:
    ssid: "MagneticRelay"
    password: "12345678"

  # 可选：快速连接常用WiFi（后期可通过captive portal添加）
  # networks:
  #   - ssid: "家里WiFi"
  #     password: "xxxxxxxx"

captive_portal:

# ======================
#   全局变量
# ======================
globals:
  - id: relay_state
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: power_on_behavior
    type: int
    restore_value: yes
    initial_value: '0'      # 0=断电记忆  1=always_on  2=always_off

  - id: today_start_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: yesterday_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: last_day
    type: int
    restore_value: yes
    initial_value: '0'

# ======================
#   时间（用于判断日期变化）
# ======================
time:
  - platform: sntp
    id: my_time

# ======================
#   磁保持继电器控制
# ======================
output:
  - platform: gpio
    pin: GPIO4
    id: relay_set

  - platform: gpio
    pin: GPIO5
    id: relay_reset

switch:
  - platform: template
    name: "继电器开关"
    id: relay_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

    turn_on_action:
      - if:
          condition:
            lambda: 'return id(power_on_behavior) != 2;'   # 不是 always_off
          then:
            - output.turn_on: relay_set
            - delay: 70ms
            - output.turn_off: relay_set
            - globals.set:
                id: relay_state
                value: "true"

    turn_off_action:
      - if:
          condition:
            lambda: 'return id(power_on_behavior) != 1;'   # 不是 always_on
          then:
            - output.turn_on: relay_reset
            - delay: 70ms
            - output.turn_off: relay_reset
            - globals.set:
                id: relay_state
                value: "false"

    lambda: |-
      return id(relay_state);

  # 上电行为选择（本质是个选项）
  - platform: template
    name: "上电状态"
    id: power_on_mode_switch
    optimistic: true
    assumed_state: true

    lambda: |-
      if (id(power_on_behavior) == 0) return "断电记忆";
      if (id(power_on_behavior) == 1) return "总是开启";
      if (id(power_on_behavior) == 2) return "总是关闭";
      return "未知";

    turn_on_action: []   # 无实际开关动作，仅显示用

    on_turn_on:
      then:
        - lambda: |-
            id(power_on_behavior) = (id(power_on_behavior) + 1) % 3;
            id(power_on_mode_switch).publish_state(true);  # 强制刷新显示

    on_turn_off:
      then:
        - lambda: |-
            id(power_on_behavior) = (id(power_on_behavior) + 1) % 3;
            id(power_on_mode_switch).publish_state(true);

# ======================
#   通电时根据设置决定继电器状态
# ======================
on_boot:
  priority: 600
  then:
    - delay: 800ms   # 等待电源稳定
    - if:
        condition:
          lambda: 'return id(power_on_behavior) == 1;'
        then:
          - switch.turn_on: relay_switch
    - if:
        condition:
          lambda: 'return id(power_on_behavior) == 0 && id(relay_state) == true;'
        then:
          - switch.turn_on: relay_switch
    # always_off 什么都不做

# ======================
#   按键逻辑（GPIO0）
# ======================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "按键"
    internal: true
    on_press:
      then:
        - delay: 50ms   # 消抖

    on_multi_click:
      - timing:
          - ON for at most 5s
          - OFF for at least 200ms
        then:
          - switch.toggle: relay_switch

      # 长按5~10秒 → 恢复出厂设置
      - timing:
          - ON for 5s to 10s
        then:
          - light.addressable_rainbow:  # 或者其他闪烁方式
          - button.factory_reset:

# ======================
#   状态指示灯（WiFi状态）
# ======================
status_led:
  - platform: gpio
    pin:
      number: GPIO2
      inverted: true   # 低电平点亮

# ======================
#   BL0937 电能计量
# ======================
sensor:
  - platform: bl0937
    sel_pin: GPIO14
    cf_pin: GPIO13
    cf1_pin: GPIO12
    current_resistor: 0.001     # 请替换为实际采样电阻值
    voltage_divider: 940.0      # 请替换为实际分压比
    update_interval: 10s
    power:
      name: "功率"
      unit_of_measurement: "W"
    current:
      name: "电流"
      unit_of_measurement: "A"
      accuracy_decimals: 3
    voltage:
      name: "电压"
      unit_of_measurement: "V"
    apparent_power:
      name: "视在功率"
      unit_of_measurement: "VA"
    power_factor:
      name: "功率因数"
    # reactive_power 部分型号不支持或需要特殊配置

  # 累计电量计算（软件实现）
  - platform: template
    name: "今日用电量"
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    lambda: |-
      if (!id(my_time).is_valid()) return {};
      auto now = id(my_time).now();
      int current_day = now.day_of_year;
      if (current_day != id(last_day)) {
        id(yesterday_energy) = id(today_start_energy);
        id(today_start_energy) = id(total_energy);
        id(last_day) = current_day;
      }
      return (id(total_energy) - id(today_start_energy)) / 1000.0;

    update_interval: 60s

  - platform: template
    name: "昨日用电量"
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    lambda: 'return id(yesterday_energy) / 1000.0;'
    update_interval: 60s

  - platform: template
    name: "总用电量"
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    lambda: 'return id(total_energy) / 1000.0;'
    update_interval: 10s

  - platform: integration
    name: "累计电量脉冲积分"
    sensor: power        # 引用上面的功率传感器
    time_unit: hour
    unit_of_measurement: "kWh"
    filters:
      - multiply: 0.001   # W → kWh
    id: total_energy_sensor
    internal: true
    on_value:
      then:
        - lambda: |-
            id(total_energy) += x;

# ======================
#   一键重置电量
# ======================
switch:
  - platform: template
    name: "电量重置开关"
    id: energy_reset_switch
    optimistic: true
    turn_on_action:
      - lambda: |-
          id(today_start_energy) = id(total_energy);
          id(yesterday_energy) = 0.0;
        - switch.turn_off: energy_reset_switch   # 自复位开关

      # 继电器闪烁两次作为提示
      - repeat:
          count: 2
          then:
            - output.turn_on: relay_set
            - delay: 300ms
            - output.turn_off: relay_set
            - delay: 400ms
            - output.turn_on: relay_reset
            - delay: 300ms
            - output.turn_off: relay_reset
            - delay: 700ms
