  # BH1750光照传感器
  - platform: bh1750
    name: "Illuminance" #光线亮度
    id: guangzhao_qiangdu
    address: 0x23  # BH1750地址，可以是0x23或0x5C
    update_interval: 10s  # 更新间隔
    unit_of_measurement: lx
    accuracy_decimals: 1
    icon: "mdi:brightness-6"
    filters:
      - sliding_window_moving_average:  # 滑动平均滤波
          window_size: 5 # 取最近5次的平均值
          send_every: 1 # 每次更新都发送平均值
      - multiply: 100  # 乘以100 
  # DHT22温湿度传感器
  - platform: dht
    pin: GPIO3                 # DHT22数据线连接的GPIO引脚
    model: DHT22               # 传感器型号
    temperature:
      name: "Temperature"      # 环境温度
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      device_class: temperature # 温度传感器
      filters:
      - sliding_window_moving_average:     # 滑动窗口平均（最常用）
          window_size: 7                   # 取最近7次有效值做平均（可调5~15）
          send_every: 7                    # 每7次才上报一次（平滑+降低上报频率）
          send_first_at: 1                 # 开机第一次就发
      - throttle: 60s                      # 额外限制：最快每60秒才上报一次（防止太频繁）
    humidity:
      name: "Humidity"         # 环境湿度
      unit_of_measurement: "%"
      accuracy_decimals: 1
      device_class: humidity
      filters:
      - sliding_window_moving_average:     # 滑动窗口平均（最常用）
          window_size: 7                   # 取最近7次有效值做平均（可调5~15）
          send_every: 7                    # 每7次才上报一次（平滑+降低上报频率）
          send_first_at: 1                 # 开机第一次就发
      - throttle: 60s                      # 额外限制：最快每60秒才上报一次（防止太频繁）  



   # 无线信号传感器
  # 无线信号强度 (RSSI) 以 dBm 为单位
  - platform: wifi_signal
    name: "Wireless RSSI"
    unit_of_measurement: "dBm"
    update_interval: 60s
  
  # 无线信号强度百分比
  - platform: wifi_signal
    name: "Wireless Signal"
    unit_of_measurement: "%"
    update_interval: 60s
    # 将 dBm 值转换为百分比
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

