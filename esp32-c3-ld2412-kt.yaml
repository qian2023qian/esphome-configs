esphome:
  name: "esp32-c3-ld2412-kt"
  friendly_name: ESP32-C3-ld2412-kt

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ZljJLdQwUwv83vqChbNq5uejS+ZKdpphtGkisGqK+0M="

ota:
  - platform: esphome
    password: "40b18130f1bc8e31375ae390f00fcfbb"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB   # 关键！大多数人用 8.5~11dB 就能解决
  power_save_mode: none # 可选，关闭省电模式更稳定

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-C3-Ld2410C-2"
    password: "fjqGyFZTeZN8"

captive_portal:

# UART串口配置 - 用于LD2412毫米波雷达通信
uart:
  tx_pin: GPIO21               # ESP32-C3发送引脚 → 接LD2412的RX（蓝线）
  rx_pin: GPIO20               # ESP32-C3接收引脚 → 接LD2412的TX（绿线）
  baud_rate: 115200            # LD2412固定波特率，不可更改
  stop_bits: 1                 # 停止位数
  parity: NONE                 # 校验位：无
# 配置I2C总线
i2c:
  sda: GPIO0  # D2 on NodeMCU
  scl: GPIO1  # D1 on NodeMCU
  scan: true  # 扫描I2C设备，用于调试
  id: bus_a   # 给I2C总线命名 
# 红外发射器配置
remote_transmitter:
  pin: GPIO4  # 根据你的硬件接线修改
  carrier_duty_percent: 50%  
# ==================== 全局变量 ====================
globals:
  - id: current_temp
    type: int
    restore_value: yes
    initial_value: '100'

  - id: water_timer
    type: int
    initial_value: '0'  # 当前倒计时秒数

  - id: current_water_type
    type: int
    initial_value: '0'  # 当前出水类型：0=无, 1=热水, 2=冷水

  - id: last_water_type
    type: int
    initial_value: '0'  # 上一次按下的按钮类型（用于检测重复按下）
# ==================== 温度循环脚本 ====================
script:
  - id: adjust_temperature
    then:
      - lambda: |-
          int new_temp = id(current_temp) - 5;
          if (new_temp < 45) new_temp = 100;
          id(current_temp) = new_temp;
      - component.update: current_temp_sensor

# ==================== 出水处理脚本 ====================
  - id: toggle_hot_water
    then:
      - lambda: |-
          if (id(current_water_type) == 1 && id(water_timer) > 0) {
            // 正在出热水，再次按 → 停止
            id(water_timer) = 0;
            id(current_water_type) = 0;
          } else {
            // 否则启动热水（会先清零当前）
            id(water_timer) = 0;  // 先停止可能的冷水
            id(current_water_type) = 1;
            id(water_timer) = 25;
          }
          id(last_water_type) = 1;
      - component.update: water_countdown_sensor

  - id: toggle_cold_water
    then:
      - lambda: |-
          if (id(current_water_type) == 2 && id(water_timer) > 0) {
            // 正在出冷水，再次按 → 停止
            id(water_timer) = 0;
            id(current_water_type) = 0;
          } else {
            // 否则启动冷水
            id(water_timer) = 0;
            id(current_water_type) = 2;
            id(water_timer) = 25;
          }
          id(last_water_type) = 2;
      - component.update: water_countdown_sensor

# ==================== 每秒倒计时 ====================
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(water_timer) > 0;'
          then:
            - globals.set:
                id: water_timer
                value: !lambda 'return id(water_timer) - 1;'
            - component.update: water_countdown_sensor
          else:
            - if:
                condition:
                  lambda: 'return id(water_timer) == 0 && id(current_water_type) != 0;'
                then:
                  - globals.set:
                      id: current_water_type
                      value: '0'
                  - component.update: water_countdown_sensor      
