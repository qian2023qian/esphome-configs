esphome:
  name: esp32-c3-dj
  friendly_name: ESP32-C3-电调控制器
  on_boot:
    priority: 600
    then:
      - script.execute: drv2605l_init

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# I²C 总线 — DRV2605L 触觉驱动
i2c:
  sda: GPIO2
  scl: GPIO1
  frequency: 100kHz
  id: i2c_bus

# Enable logging
logger: 
  level: DEBUG # 设置日志级别为 DEBUG 以便调试 PWM 输出和电调响应

# Enable Home Assistant API
api:
  encryption:
    key: "v892kF5zUYOOHdRitiNMjr8a0OfJ+0CzGZxwyqRhXUI="

# Enable MQTT — 巴法云
mqtt:
  broker: bemfa.com
  port: 9501
  client_id: 8b53efaaace2462ea76f5d10f08ef006
  username: 8b53efaaace2462ea76f5d10f08ef006
  on_message:
    # 001 — 单次短振
    - topic: 8b53efaaace2462ea76f5d10f08ef006001
      then:
        - script.execute: lra_click
    # 002 — 连击
    - topic: 8b53efaaace2462ea76f5d10f08ef006002
      then:
        - script.execute: lra_double
    # 003 — 三连击
    - topic: 8b53efaaace2462ea76f5d10f08ef006003
      then:
        - script.execute: lra_triple
    # 004 — 持续振
    - topic: 8b53efaaace2462ea76f5d10f08ef006004
      then:
        - script.execute: lra_buzz
    # 005 — 长振
    - topic: 8b53efaaace2462ea76f5d10f08ef006005
      then:
        - script.execute: lra_long_buzz
    # 006 — 脉冲
    - topic: 8b53efaaace2462ea76f5d10f08ef006006
      then:
        - script.execute: lra_pulse
    # 007 — 渐强
    - topic: 8b53efaaace2462ea76f5d10f08ef006007
      then:
        - script.execute: lra_ramp_up
    # 008 — 滑块控制 (payload: 0-100)
    - topic: 8b53efaaace2462ea76f5d10f08ef006008
      then:
        - lambda: |-
            int spd = atoi(x.c_str());
            if (spd > 0) {
              auto call = id(lra_fan).turn_on();
              call.set_speed(spd);
              call.perform();
            } else {
              id(lra_fan).turn_off().perform();
            }

ota:
  - platform: esphome
    password: "756358e2140b514dbc629679515d202a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-C3-Dj Fallback Hotspot"   # 热点名称
    password: "UCkpWND5dU7J"
web_server:
  port: 80

captive_portal:
# 配置硬件 PWM 输出
output:
  - platform: ledc
    id: esc_pwm_output
    pin: GPIO8  # 连接电调信号线（S）的 GPIO 引脚
    frequency: 50Hz
    
    # 占空比计算 (频率 50Hz 时，一个周期为 1000ms / 50 = 20ms)
    # 停止信号：0.9ms / 20ms = 0.045 (4.5%)
    min_power: 0.045 
    
    # 最大转速信号：2.0ms / 20ms = 0.100 (10%)
    max_power: 0.100 
    
    # 【核心设置】必须设为 false！
    # 这样当你在 Home Assistant 中关闭开关时，ESP 会持续输出 min_power (0.9ms)，
    # 从而保持电调的停止状态，并满足其开机安全自检必须接收 0.9ms 信号的需求。
    zero_means_zero: false

  # 触觉输出 — 通过 I²C 写入 DRV2605L RTP 寄存器 (0x02)
  - platform: template
    id: haptic_output
    type: float
    write_action:
      - lambda: |-
          uint8_t val = static_cast<uint8_t>(state * 127.0);
          uint8_t data[] = {0x02, val};
          id(i2c_bus)->write(0x5A, data, 2);

# DRV2605L 初始化 — 上电自动校准
script:
  - id: drv2605l_init
    then:
      # 待机模式
      - lambda: |-
          uint8_t d[] = {0x01, 0x00};
          id(i2c_bus)->write(0x5A, d, 2);
      - delay: 10ms
      # 设置 LRA 模式 + 开环补偿 (寄存器 0x1A)
      - lambda: |-
          uint8_t d[] = {0x1A, 0xA0};
          id(i2c_bus)->write(0x5A, d, 2);
      # 额定电压 ~2.5V (寄存器 0x16)
      - lambda: |-
          uint8_t d[] = {0x16, 0x75};
          id(i2c_bus)->write(0x5A, d, 2);
      # 过驱电压 ~3.0V (寄存器 0x17)
      - lambda: |-
          uint8_t d[] = {0x17, 0x96};
          id(i2c_bus)->write(0x5A, d, 2);
      # 启动自动校准
      - lambda: |-
          uint8_t d[] = {0x01, 0x07};
          id(i2c_bus)->write(0x5A, d, 2);
      - delay: 1200ms
      # 进入 RTP 模式
      - lambda: |-
          uint8_t d[] = {0x01, 0x05};
          id(i2c_bus)->write(0x5A, d, 2);

  # 6秒超时自动关闭 — 防止过热
  - id: lra_auto_off
    mode: restart
    then:
      - delay: 6s
      - fan.turn_off: lra_fan

  # “哒” 单次短振
  - id: lra_click
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan

  # “哒哒” 连击
  - id: lra_double
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan
      - delay: 50ms
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan

  # “哒哒哒” 三连击
  - id: lra_triple
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan
      - delay: 40ms
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan
      - delay: 40ms
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 30ms
      - fan.turn_off: lra_fan

  # “嗡嗡嗡” 持续振
  - id: lra_buzz
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 60
      - delay: 500ms
      - fan.turn_off: lra_fan

  # “嗡~~~” 长振提醒
  - id: lra_long_buzz
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 50
      - delay: 2s
      - fan.turn_off: lra_fan

  # “嗡-嗡-嗡” 脉冲
  - id: lra_pulse
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 70
      - delay: 150ms
      - fan.turn_off: lra_fan
      - delay: 150ms
      - fan.turn_on:
          id: lra_fan
          speed: 70
      - delay: 150ms
      - fan.turn_off: lra_fan
      - delay: 150ms
      - fan.turn_on:
          id: lra_fan
          speed: 70
      - delay: 150ms
      - fan.turn_off: lra_fan

  # 渐强振
  - id: lra_ramp_up
    then:
      - fan.turn_on:
          id: lra_fan
          speed: 20
      - delay: 200ms
      - fan.turn_on:
          id: lra_fan
          speed: 40
      - delay: 200ms
      - fan.turn_on:
          id: lra_fan
          speed: 60
      - delay: 200ms
      - fan.turn_on:
          id: lra_fan
          speed: 80
      - delay: 300ms
      - fan.turn_off: lra_fan

# 使用风扇组件来控制转速，UI 界面更直观
fan:
  - platform: speed
    output: esc_pwm_output
    name: “Brushless Motor”
    # 每次 ESP 启动时强制保持关闭状态 (输出 0.9ms)，
    # 防止因记录了上次的开启状态而导致电调无法通过自检或电机意外高速旋转。
    restore_mode: ALWAYS_OFF

  # DRV2605L 线性马达强度控制
  - platform: speed
    output: haptic_output
    name: “线性马达强度”
    id: lra_fan
    speed_count: 100
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: lra_auto_off

# 振动效果触发按钮
button:
  - platform: template
    name: “LRA Click 哒”
    on_press:
      - script.execute: lra_click

  - platform: template
    name: “LRA Double 哒哒”
    on_press:
      - script.execute: lra_double

  - platform: template
    name: “LRA Triple 哒哒哒”
    on_press:
      - script.execute: lra_triple

  - platform: template
    name: “LRA Buzz 嗡嗡嗡”
    on_press:
      - script.execute: lra_buzz

  - platform: template
    name: “LRA Long 嗡~~~”
    on_press:
      - script.execute: lra_long_buzz

  - platform: template
    name: “LRA Pulse 脉冲”
    on_press:
      - script.execute: lra_pulse

  - platform: template
    name: “LRA RampUp 渐强”
    on_press:
      - script.execute: lra_ramp_up