esphome:
  name: c3-ceshi
  friendly_name: c3-ceshi

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
 # encryption:
    #key: "v892kF5zUYOOHdRitiNMjr8a0OfJ+0CzGZxwyqRhXUI="

    

ota:
  - platform: esphome
    password: "12345678"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "C3-Ceshi Fallback Hotspot"
    password: "12345678"
web_server:
  port: 80
captive_portal:
# ==================== SPI 总线 ====================
spi:
  clk_pin: GPIO6   # SCK
  mosi_pin: GPIO7  # MOSI
  miso_pin: GPIO8  # MISO

# ==================== 语音模块 LD3320 ====================
external_components:
  - source: components
    components: [ld3320]

ld3320:
  id: voice_chip
  cs_pin: GPIO5    # CS
  rst_pin: GPIO9  # RST
  int_pin: GPIO10  # INT
  keywords:
    # --- LED 灯带控制 ---
    - pinyin: "kai deng"
      command: 0x01
    - pinyin: "guan deng"
      command: 0x02
    - pinyin: "cai hong deng"
      command: 0x03
    - pinyin: "hu xi deng"
      command: 0x04
    - pinyin: "pin shan deng"
      command: 0x05
    - pinyin: "shan shuo deng"
      command: 0x06

    # --- 舵机1 控制 ---
    - pinyin: "duo ji yi zuo"
      command: 0x10
    - pinyin: "duo ji yi you"
      command: 0x11
    - pinyin: "duo ji yi zhong jian"
      command: 0x12

    # --- 舵机2 控制 ---
    - pinyin: "duo ji er zuo"
      command: 0x20
    - pinyin: "duo ji er you"
      command: 0x21
    - pinyin: "duo ji er zhong jian"
      command: 0x22

  on_result:
    - |-
      switch (x) {
        // ===== LED 灯带 =====
        case 0x01:  // 开灯
          ESP_LOGI("voice", ">>> kai deng (turn on LED)");
          id(led_strip).turn_on().set_brightness(1.0).perform();
          break;
        case 0x02:  // 关灯
          ESP_LOGI("voice", ">>> guan deng (turn off LED)");
          id(led_strip).turn_off().perform();
          break;
        case 0x03:  // 彩虹灯
          ESP_LOGI("voice", ">>> cai hong deng (rainbow effect)");
          id(led_strip).turn_on().set_effect("彩虹效果").perform();
          break;
        case 0x04:  // 呼吸灯
          ESP_LOGI("voice", ">>> hu xi deng (pulse effect)");
          id(led_strip).turn_on().set_effect("呼吸效果").perform();
          break;
        case 0x05:  // 频闪灯
          ESP_LOGI("voice", ">>> pin shan deng (strobe effect)");
          id(led_strip).turn_on().set_effect("频闪效果").perform();
          break;
        case 0x06:  // 闪烁灯
          ESP_LOGI("voice", ">>> shan shuo deng (flicker effect)");
          id(led_strip).turn_on().set_effect("闪烁效果").perform();
          break;

        // ===== 舵机1 =====
        case 0x10:  // 舵机1左转
          ESP_LOGI("voice", ">>> duo ji 1 zuo (servo 1 left)");
          id(servo1).write(-1.0);
          break;
        case 0x11:  // 舵机1右转
          ESP_LOGI("voice", ">>> duo ji 1 you (servo 1 right)");
          id(servo1).write(1.0);
          break;
        case 0x12:  // 舵机1居中
          ESP_LOGI("voice", ">>> duo ji 1 zhong (servo 1 center)");
          id(servo1).write(0.0);
          break;

        // ===== 舵机2 =====
        case 0x20:  // 舵机2左转
          ESP_LOGI("voice", ">>> duo ji 2 zuo (servo 2 left)");
          id(servo2).write(-1.0);
          break;
        case 0x21:  // 舵机2右转
          ESP_LOGI("voice", ">>> duo ji 2 you (servo 2 right)");
          id(servo2).write(1.0);
          break;
        case 0x22:  // 舵机2居中
          ESP_LOGI("voice", ">>> duo ji 2 zhong (servo 2 center)");
          id(servo2).write(0.0);
          break;

        default:
          ESP_LOGW("voice", "Unknown command: 0x%02X", x);
          break;
      }
# ==================== 舵机 ====================
output:
  - platform: ledc
    id: servo1_pwm
    pin: GPIO1
    frequency: 50Hz

  - platform: ledc
    id: servo2_pwm
    pin: GPIO2
    frequency: 50Hz

# ==================== 舵机 ====================
servo:
  - id: servo1
    output: servo1_pwm
  - id: servo2
    output: servo2_pwm

# 舵机测试控制
number:
  - platform: template
    name: "舵机1 角度"
    id: servo1_angle
    min_value: -90
    max_value: 90
    step: 1
    optimistic: true
    mode: slider
    on_value:
      - lambda: id(servo1).write(x / 90.0);

  - platform: template
    name: "舵机2 角度"
    id: servo2_angle
    min_value: -90
    max_value: 90
    step: 1
    optimistic: true
    mode: slider
    on_value:
      - lambda: id(servo2).write(x / 90.0);

# 舵机快捷按钮
button:
  - platform: template
    name: "舵机1 居中"
    on_press:
      - lambda: |
          id(servo1).write(0.0);
          id(servo1_angle).publish_state(0);

  - platform: template
    name: "舵机2 居中"
    on_press:
      - lambda: |
          id(servo2).write(0.0);
          id(servo2_angle).publish_state(0);

# ==================== LED 灯带 (WS2812) ====================
light:
  - platform: esp32_rmt_led_strip
    id: led_strip
    rgb_order: GRB
    pin: GPIO0
    num_leds: 30
    chipset: WS2812
    name: "LED灯带"
    effects:
      - pulse:
          name: "呼吸效果"
      - strobe:
          name: "频闪效果"
      - flicker:
          name: "闪烁效果"
      - addressable_rainbow:
          name: "彩虹效果"
      - addressable_color_wipe:
          name: "颜色擦除"
      - addressable_scan:
          name: "扫描效果"
    