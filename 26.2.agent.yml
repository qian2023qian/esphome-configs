esphome:
  name: water-heater-monitor
  friendly_name: Water Heater Monitor

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi + 固定 IP
wifi:
  ssid: ASUS
  password: 030800467stL
  manual_ip:
    static_ip: 192.168.50.37
    gateway: 192.168.50.1
    subnet: 255.255.255.0

# 日志级别建议运行稳定后改为 INFO 或 WARN
logger:
  level: DEBUG   # 调试时用 DEBUG，上线建议 INFO

# API + 加密（保持原样）
api:
  encryption:
    key: VRPd3w+CBqLvScJ1j1yjJ9ZGuzCihgjJxuqeeOEDDLc=

# OTA（建议后面把密码放入 secrets.yaml）
ota:
  - platform: esphome
    password: 97496b777d55c2b6e71c9ac7c66c7832

# Web Server（上线建议改强密码或关闭）
web_server:
  port: 80
  auth:
    username: admin
    password: admin

# 时间（用于跨天判断）
time:
  - platform: homeassistant
    id: ha_time

# OneWire 总线
one_wire:
  - platform: gpio
    pin: GPIO04

# 全局变量（日累计 + 上次日期）
globals:
  - id: daily_water_l
    type: float
    restore_value: yes
    initial_value: '0'
  - id: daily_energy_kwh
    type: float
    restore_value: yes
    initial_value: '0'
  - id: last_day
    type: int
    restore_value: no
    initial_value: '0'

# 传感器部分
sensor:
  # 1. 脉冲流量计 → 瞬时流速 L/min
  - platform: pulse_meter
    pin: GPIO18
    name: "Flow Rate"
    id: flow_rate_l_min
    unit_of_measurement: "L/min"
    device_class: volume_flow_rate
    state_class: measurement
    internal_filter: 12ms
    internal_filter_mode: EDGE          # 适合大多数 reed 开关
    accuracy_decimals: 1
    filters:
      - multiply: 0.002941176470588235  # 1/340 ≈ 0.002941176470588235

  # 2. 当天用水量（L）
  - platform: template
    name: "Daily Water"
    id: daily_water
    unit_of_measurement: "L"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(daily_water_l);
    state_class: total_increasing
    icon: "mdi:water"

  # 3. 回水温度 T1
  - platform: dallas_temp
    address: 0xDE3CE1E380B86F28        # ← 替换成你的实际地址
    name: "Return Water Temp (T1)"
    id: temp_t1
    unit_of_measurement: "°C"
    update_interval: 3s
    accuracy_decimals: 1
    filters:
      - sliding_window_moving_average:
          window_size: 12
          send_every: 6
      - debounce: 0.4s

  # 4. 送水温度 T2
  - platform: dallas_temp
    address: 0x583CE1E380DEB528        # ← 替换成你的实际地址
    name: "Supply Water Temp (T2)"
    id: temp_t2
    unit_of_measurement: "°C"
    update_interval: 3s
    accuracy_decimals: 1
    filters:
      - sliding_window_moving_average:
          window_size: 12
          send_every: 6
      - debounce: 0.4s

  # 5. 温差
  - platform: template
    name: "Delta Temperature"
    id: delta_t
    unit_of_measurement: "°C"
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      return id(temp_t2).state - id(temp_t1).state;
    icon: "mdi:thermometer"

  # 6. 瞬时热功率 kW
  - platform: template
    name: "Heating Power"
    id: power_kw
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      float q = id(flow_rate_l_min).state;
      float dt = id(delta_t).state;
      if (dt < 0.3 || q < 0.3) return 0.0;
      return q * 4.186 * dt / 60.0;
    icon: "mdi:lightning-bolt"

  # 7. 当天累计热量 kWh
  - platform: template
    name: "Daily Energy"
    id: daily_energy
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      return id(daily_energy_kwh);
    state_class: total_increasing
    icon: "mdi:lightning-bolt"

# 定时任务：累加 + 跨天清零检测
interval:
  # 每 4 秒累加一次（平衡精度与 CPU 占用）
  - interval: 4s
    then:
      - lambda: |-
          static float last_flow = 0.0;
          float flow = id(flow_rate_l_min).state;

          // 用水量 - 梯形积分
          float delta_liters = (last_flow + flow) / 2.0f * (4.0f / 60.0f);
          id(daily_water_l) += delta_liters;
          last_flow = flow;

          // 热量（只累加正功率）
          float p = id(power_kw).state;
          if (p > 0) {
            id(daily_energy_kwh) += p * (4.0f / 3600.0f);
          }

  # 每 5 分钟检查一次是否跨天（防漏清零）
  - interval: 300s
    then:
      - if:
          condition:
            lambda: 'return id(ha_time).now().is_valid() && id(ha_time).now().day_of_month != id(last_day);'
          then:
            - globals.set:
                id: daily_water_l
                value: '0'
            - globals.set:
                id: daily_energy_kwh
                value: '0'
            - lambda: |-
                id(last_day) = id(ha_time).now().day_of_month;

# 继电器（保持原样）
switch:
  - platform: gpio
    name: "Relay 1"
    pin: GPIO05