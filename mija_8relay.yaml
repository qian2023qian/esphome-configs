esphome:
  name: esp32-8way-switch

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: "先生"
  password: "liwei@787"
  fast_connect: true
  ap:
    ssid: "ESP32-Switch-AP"
    password: "12345678"

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip

captive_portal:
logger:
api:
ota:
  - platform: esphome
    password: "liwei@787"

esp32_ble_tracker:
bluetooth_proxy:
  active: true

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

font:
  - file: "gfonts://Noto Sans CJK SC"
    id: font_cn
    size: 12
    glyphs: |
      0123456789ABCDEFGHJKLMNOPQRSTUVWXYZabcdefghjklmnopqrstuvwxyz一二三四五六七八路开关WiFi状态IP米家智能插座

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    lambda: |-
      it.printf(0, 0, id(font_cn), "米家8路智能插座");
      it.printf(0, 16, id(font_cn), "IP:%s", id(wifi_ip).state.c_str());
      it.printf(0, 32, id(font_cn), "1:%s 2:%s 3:%s 4:%s",
        id(ch1).state ? "开" : "关",
        id(ch2).state ? "开" : "关",
        id(ch3).state ? "开" : "关",
        id(ch4).state ? "开" : "关");
      it.printf(0, 48, id(font_cn), "5:%s 6:%s 7:%s 8:%s",
        id(ch5).state ? "开" : "关",
        id(ch6).state ? "开" : "关",
        id(ch7).state ? "开" : "关",
        id(ch8).state ? "开" : "关");

switch:
  - platform: gpio
    name: "插座1"
    pin: GPIO14
    id: ch1
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座2"
    pin: GPIO27
    id: ch2
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座3"
    pin: GPIO26
    id: ch3
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座4"
    pin: GPIO25
    id: ch4
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座5"
    pin: GPIO33
    id: ch5
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座6"
    pin: GPIO32
    id: ch6
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座7"
    pin: GPIO15
    id: ch7
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true
  - platform: gpio
    name: "插座8"
    pin: GPIO2
    id: ch8
    restore_mode: RESTORE_DEFAULT_OFF
    inverted: true