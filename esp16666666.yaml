esphome:
  name: esp32-garden-master
  friendly_name: Esp32_Garden_Master
  on_boot:
    - priority: 900
      then:
        - lambda: |-
            digitalWrite(5, HIGH);
            digitalWrite(12, LOW);
            digitalWrite(13, LOW);
            digitalWrite(14, LOW);
            pinMode(5, OUTPUT);
            pinMode(12, OUTPUT);
            pinMode(13, OUTPUT);
            pinMode(14, OUTPUT);
        - script.execute: update_relays
        - output.turn_on: relay_oe
    - priority: -100
      then:
        - delay: 3s
        - script.execute: update_relays

