script:
  - id: update_relays
    mode: restart
    then:
      - lambda: |-
          digitalWrite(5, HIGH);

          uint16_t data = 0;
          if (id(r1).state)  data |= (1 << 0);
          if (id(r2).state)  data |= (1 << 1);
          if (id(r3).state)  data |= (1 << 2);
          if (id(r4).state)  data |= (1 << 3);
          if (id(r5).state)  data |= (1 << 4);
          if (id(r6).state)  data |= (1 << 5);
          if (id(r7).state)  data |= (1 << 6);
          if (id(r8).state)  data |= (1 << 7);
          if (id(r9).state)  data |= (1 << 8);
          if (id(r10).state) data |= (1 << 9);
          if (id(r11).state) data |= (1 << 10);
          if (id(r12).state) data |= (1 << 11);
          if (id(r13).state) data |= (1 << 12);
          if (id(r14).state) data |= (1 << 13);
          if (id(r15).state) data |= (1 << 14);
          if (id(r16).state) data |= (1 << 15);

          for (uint8_t i = 0; i < 16; i++) {
            digitalWrite(13, LOW);
            if (data & 0x8000)
              digitalWrite(14, HIGH);
            else
              digitalWrite(14, LOW);
            data <<= 1;
            digitalWrite(13, HIGH);
          }
          digitalWrite(12, LOW);
          digitalWrite(12, HIGH);
          digitalWrite(5, LOW);

switch:
