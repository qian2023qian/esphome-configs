    password: "owwBbrKkJc7v"

captive_portal:

# UART串口配置 - 用于LD2412毫米波雷达通信
uart:
  tx_pin: GPIO21               # ESP32-C3发送引脚 → 接LD2412的RX（蓝线）
  rx_pin: GPIO20               # ESP32-C3接收引脚 → 接LD2412的TX（绿线）
  baud_rate: 115200            # LD2412固定波特率，不可更改
  stop_bits: 1                 # 停止位数
  parity: NONE                 # 校验位：无
# 配置I2C总线
i2c:
  sda: GPIO1  # D2 on NodeMCU
  scl: GPIO0  # D1 on NodeMCU
  scan: true  # 扫描I2C设备，用于调试
  id: bus_a   # 给I2C总线命名 
# Example configuration entry
ld2412:

binary_sensor:
  - platform: ld2412
    has_target:
      name: "Presence"
    has_moving_target:
      name: "Moving Target"
    has_still_target:
      name: "Still Target"
    dynamic_background_correction_status:
      name: "Dynamic Background Correction Status"
  - platform: gpio
    pin: GPIO3
    name: "LD2412 Out Pin Status"
    device_class: presence         
  # 二进制传感器：光照水平阈值
  - platform: analog_threshold
    name: "adequate illumination" #光照充足
    sensor_id: guangzhao_qiangdu           # ← 必须用 id 引用前面的 bh1750 传感器
    threshold: 300
    device_class: light            

