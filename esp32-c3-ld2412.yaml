esphome:
  name: esp32-c3-ld2412
  friendly_name: "ESP32-C3 LD2412 阳台人存传感器"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "un6TX/q7rAu/KeEClGUn+krwdudzF6xGF1u32+1Isx4="

ota:
  - platform: esphome
    password: "34e128fcdb1fa4edb81fdf3e2856cc51"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
