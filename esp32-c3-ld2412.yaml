      move_energy:
        name: Gate 13 move energy
      still_energy:
        name: Gate 13 still energy
  # BH1750光照传感器
  - platform: bh1750
    name: "Illuminance" #光线亮度
    id: guangzhao_qiangdu
    address: 0x23  # BH1750地址，可以是0x23或0x5C
    update_interval: 10s  # 更新间隔
    unit_of_measurement: lx
    accuracy_decimals: 1
    icon: "mdi:brightness-6"
    filters:
      - sliding_window_moving_average:  # 滑动平均滤波
          window_size: 5
          send_every: 1
      #- multiply: 100  # 乘以100 

# AHT30温湿度传感器
  # AHT30 (用 variant: AHT20 处理)
  - platform: aht10
    variant: AHT20               # AHT30 用这个，正确
    address: 0x38                # 十六进制写法，别写 56（虽然 0x38=56，但必须用 0xXX）
    update_interval: 60s         # 或改 60s 更稳定

    temperature:
      id: Temperature
      name: "Temperature"  # 温度
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      icon: "mdi:thermometer"
      filters:
      - offset: -5.6
      - sliding_window_moving_average:
            window_size: 7  # 取最近7次有效值做平均（可调5~15）
            send_every: 3 # 每7次才上报一次（平滑+降低上报频率）
            send_first_at: 1                 # 开机第一次就发
      - throttle: 60s                      # 额外限制：最快每60秒才上报一次（防止太频繁）
    humidity:
      id: Humidity
      name: "Humidity" #湿度
      unit_of_measurement: "%"
      accuracy_decimals: 1
      icon: "mdi:water-percent"
      filters:
      - sliding_window_moving_average:     # 滑动窗口平均（最常用）
          window_size: 7                   # 取最近7次有效值做平均（可调5~15）
          send_every: 3                    # 每7次才上报一次（平滑+降低上报频率）
          send_first_at: 1                 # 开机第一次就发
      - throttle: 60s                      # 额外限制：最快每60秒才上报一次（防止太频繁）  

