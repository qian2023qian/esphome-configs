substitutions:
  device_name: espmmw_02

esphome:
  name: ${device_name}
  includes:
    - XRA2413MT.h
  # project:           # 可选
  #   name: yourname.mmwave-sensor
  #   version: "1.0"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  level: INFO        # 可根据需要调整为 DEBUG / VERBOSE

api:
  password: "12345678"
  
ota:
  - platform: esphome
    password: "12345678"


wifi: # WiFi 配置
  ssid: "JUN_WIFI"
  password: "Lfj_780529@.com"
  fast_connect: true   #（on → true）

web_server:
  port: 80

uart:
  id: uart_bus
  rx_pin: GPIO5
  tx_pin: GPIO6
  baud_rate: 256000
  data_bits: 8
  stop_bits: 1

globals:
  - id: uart_delay
    type: int
    restore_value: true
    initial_value: '100'

  - id: start_frame
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: '{0xFD, 0xFC, 0xFB, 0xFA, 0x04, 0x00, 0xFF, 0x00, 0x01, 0x00, 0x04, 0x03, 0x02, 0x01}'

  - id: end_frame
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: '{0xFD, 0xFC, 0xFB, 0xFA, 0x02, 0x00, 0xFE, 0x00, 0x04, 0x03, 0x02, 0x01}'

  - id: read_config_frame
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: '{0xFD, 0xFC, 0xFB, 0xFA, 0x02, 0x00, 0x61, 0x00, 0x04, 0x03, 0x02, 0x01}'

  - id: default_distance_frame
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: '{0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x60, 0x00, 0x00, 0x00, 0x06, 0x00, 0x00, 0x00, 0x01, 0x00, 0x06, 0x00, 0x00, 0x00, 0x02, 0x00, 0x05, 0x00, 0x00, 0x00, 0x04, 0x03, 0x02, 0x01}'

  - id: default_sensitivity_frame
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: '{0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x64, 0x00, 0x00, 0x00, 0xFF, 0xFF, 0x00, 0x00, 0x01, 0x00, 0x63, 0x00, 0x00, 0x00, 0x02, 0x00, 0x0F, 0x00, 0x00, 0x00, 0x04, 0x03, 0x02, 0x01}'

  - id: max_move_distance
    type: int
    restore_value: true
    initial_value: '0'
  - id: max_static_distance
    type: int
    restore_value: true
    initial_value: '0'
  - id: unattended_duration
    type: int
    restore_value: true
    initial_value: '0'
  - id: move_sensitivity
    type: int
    restore_value: true
    initial_value: '0'
  - id: static_sensitivity
    type: int
    restore_value: true
    initial_value: '0'

external_components:
  - source:
      type: local
      path: components  # 假设你的 xra2413mt 文件夹在 components/ 目录下
    components: [xra2413mt]

xra2413mt:
  id: my_xra2413mt
  uart_id: uart_bus

button:
  - platform: restart
    name: "${device_name} Reboot"

  - platform: template
    name: "${device_name} Get Config"
    id: btn_get_conf
    on_press:
      then:
        - uart.write: !lambda 'return id(start_frame);'
        - delay: !lambda 'return id(uart_delay);'
        - uart.write: !lambda 'return id(read_config_frame);'
        - delay: !lambda 'return id(uart_delay);'
        - uart.write: !lambda 'return id(end_frame);'

  - platform: template
    name: "${device_name} Reset Radar"
    id: btn_reset_mmw
    on_press:
      then:
        - uart.write: !lambda 'return id(start_frame);'
        - delay: !lambda 'return id(uart_delay);'
        - uart.write: !lambda 'return id(default_distance_frame);'
        - uart.write: !lambda 'return id(default_sensitivity_frame);'
        - delay: !lambda 'return id(uart_delay);'
        - uart.write: !lambda 'return id(end_frame);'

number:
  - platform: template
    id: num_max_move
    name: "${device_name} Max Move Distance"
    optimistic: true
    min_value: 2
    max_value: 6
    step: 1
    unit_of_measurement: "×0.75m"
    set_action:
      - globals.set:
          id: max_move_distance
          value: !lambda 'return x;'
      - lambda: |-
          id(uart_bus)->write_array(id(start_frame).data(), id(start_frame).size());
          delay(id(uart_delay));
          
          uint8_t cmd[] = {
            0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x60, 0x00,
            0x00, 0x00,
            (uint8_t)x, 0x00, 0x00, 0x00,               // 移动最大距离
            0x01, 0x00,
            (uint8_t)id(max_static_distance), 0x00, 0x00, 0x00,  // 静止最大距离
            0x02, 0x00,
            (uint8_t)id(unattended_duration), 0x00, 0x00, 0x00,   // 无人持续时间
            0x04, 0x03, 0x02, 0x01
          };
          id(uart_bus)->write_array(cmd, sizeof(cmd));
          delay(id(uart_delay));
          
          id(uart_bus)->write_array(id(end_frame).data(), id(end_frame).size());

  - platform: template
    id: num_max_static
    name: "${device_name} Max Static Distance"
    optimistic: true
    min_value: 2
    max_value: 6
    step: 1
    unit_of_measurement: "×0.75m"
    set_action:
      - globals.set:
          id: max_static_distance
          value: !lambda 'return x;'
      - lambda: |-
          id(uart_bus)->write_array(id(start_frame).data(), id(start_frame).size());
          delay(id(uart_delay));
          
          uint8_t cmd[] = {
            0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x60, 0x00,
            0x00, 0x00,
            (uint8_t)id(max_move_distance), 0x00, 0x00, 0x00,   // 移动最大距离
            0x01, 0x00,
            (uint8_t)x, 0x00, 0x00, 0x00,                       // 静止最大距离
            0x02, 0x00,
            (uint8_t)id(unattended_duration), 0x00, 0x00, 0x00, // 无人持续时间
            0x04, 0x03, 0x02, 0x01
          };
          id(uart_bus)->write_array(cmd, sizeof(cmd));
          delay(id(uart_delay));
          
          id(uart_bus)->write_array(id(end_frame).data(), id(end_frame).size());

  - platform: template
    id: num_unattended
    name: "${device_name} Unattended Duration"
    optimistic: true
    min_value: 0
    max_value: 600
    step: 1
    mode: box
    unit_of_measurement: "s"
    set_action:
      - globals.set:
          id: unattended_duration
          value: !lambda 'return x;'
      - lambda: |-
          id(uart_bus)->write_array(id(start_frame).data(), id(start_frame).size());
          delay(id(uart_delay));
          
          uint8_t cmd[] = {
            0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x60, 0x00,
            0x00, 0x00,
            (uint8_t)id(max_move_distance), 0x00, 0x00, 0x00,
            0x01, 0x00,
            (uint8_t)id(max_static_distance), 0x00, 0x00, 0x00,
            0x02, 0x00,
            (uint8_t)x, 0x00, 0x00, 0x00,                       // 无人持续时间
            0x04, 0x03, 0x02, 0x01
          };
          id(uart_bus)->write_array(cmd, sizeof(cmd));
          delay(id(uart_delay));
          
          id(uart_bus)->write_array(id(end_frame).data(), id(end_frame).size());

  - platform: template
    id: num_move_sens
    name: "${device_name} Move Sensitivity"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    mode: box
    set_action:
      - globals.set:
          id: move_sensitivity
          value: !lambda 'return x;'
      - lambda: |-
          id(uart_bus)->write_array(id(start_frame).data(), id(start_frame).size());
          delay(id(uart_delay));
          
          uint8_t cmd[] = {
            0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x64, 0x00,
            0x00, 0x00,
            0xFF, 0xFF, 0x00, 0x00,                             // 保留或固定值（原协议）
            0x01, 0x00,
            (uint8_t)x, 0x00, 0x00, 0x00,                       // 移动灵敏度
            0x02, 0x00,
            (uint8_t)id(static_sensitivity), 0x00, 0x00, 0x00,  // 静止灵敏度
            0x04, 0x03, 0x02, 0x01
          };
          id(uart_bus)->write_array(cmd, sizeof(cmd));
          delay(id(uart_delay));
          
          id(uart_bus)->write_array(id(end_frame).data(), id(end_frame).size());

  - platform: template
    id: num_static_sens
    name: "${device_name} Static Sensitivity"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    mode: box
    set_action:
      - globals.set:
          id: static_sensitivity
          value: !lambda 'return x;'
      - lambda: |-
          id(uart_bus)->write_array(id(start_frame).data(), id(start_frame).size());
          delay(id(uart_delay));
          
          uint8_t cmd[] = {
            0xFD, 0xFC, 0xFB, 0xFA, 0x14, 0x00, 0x64, 0x00,
            0x00, 0x00,
            0xFF, 0xFF, 0x00, 0x00,                             // 保留或固定值（原协议）
            0x01, 0x00,
            (uint8_t)id(move_sensitivity), 0x00, 0x00, 0x00,    // 移动灵敏度
            0x02, 0x00,
            (uint8_t)x, 0x00, 0x00, 0x00,                       // 静止灵敏度
            0x04, 0x03, 0x02, 0x01
          };
          id(uart_bus)->write_array(cmd, sizeof(cmd));
          delay(id(uart_delay));
          
          id(uart_bus)->write_array(id(end_frame).data(), id(end_frame).size());

binary_sensor:
  - platform: gpio
    pin: GPIO4
    name: "${device_name} Occupancy"
    device_class: occupancy
    id: mmw_occupancy

  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLUP
      inverted: true
    name: "${device_name} Reset Button"
    on_press:
      - button.press: btn_reset_mmw

sensor:
  - platform: uptime
    name: "${device_name} Uptime"

  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    update_interval: 60s

  - platform: adc
    pin: GPIO3
    name: "${device_name} Brightness"
    attenuation: 11db
    update_interval: 5s
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    accuracy_decimals: 0
    filters:
      - lambda: 'return (3.0f - x) / 0.03;'

  - platform: internal_temperature
    name: "${device_name} CPU Temperature"

  # 雷达读取的五个传感器（从 UART 解析）
  - platform: xra2413mt
    id: my_xra2413mt
    max_move_distance:
      name: "${device_name} Max Move Distance (radar)"
      internal: true
      on_value:
        then:
          - number.set:
              id: num_max_move
              value: !lambda 'return x;'
    max_static_distance:
      name: "${device_name} Max Static Distance (radar)"
      internal: true
      on_value:
        then:
          - number.set:
              id: num_max_static
              value: !lambda 'return x;'
    unattended_duration:
      name: "${device_name} Unattended Duration (radar)"
      internal: true
      unit_of_measurement: "s"
      on_value:
        then:
          - number.set:
              id: num_unattended
              value: !lambda 'return x;'
    move_sensitivity:
      name: "${device_name} Move Sensitivity (radar)"
      internal: true
      unit_of_measurement: "%"
      on_value:
        then:
          - number.set:
              id: num_move_sens
              value: !lambda 'return x;'
    static_sensitivity:
      name: "${device_name} Static Sensitivity (radar)"
      internal: true
      unit_of_measurement: "%"
      on_value:
        then:
          - number.set:
              id: num_static_sens
              value: !lambda 'return x;'

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${device_name} IP"
    mac_address:
      name: "${device_name} MAC"